<svg xmlns="http://www.w3.org/2000/svg" width="860" height="160" viewBox="0 0 860 160">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#0d1526"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="100%" style="stop-color:#0099cc"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="860" height="160" fill="url(#bg)" rx="10"/>

  <!-- subtle grid lines -->
  <g stroke="#1a2640" stroke-width="0.5" opacity="0.6">
    <line x1="0" y1="40" x2="860" y2="40"/>
    <line x1="0" y1="80" x2="860" y2="80"/>
    <line x1="0" y1="120" x2="860" y2="120"/>
    <line x1="215" y1="0" x2="215" y2="160"/>
    <line x1="430" y1="0" x2="430" y2="160"/>
    <line x1="645" y1="0" x2="645" y2="160"/>
  </g>

  <!-- radar icon -->
  <g transform="translate(68, 80)" filter="url(#glow)">
    <!-- outer rings -->
    <circle cx="0" cy="0" r="44" fill="none" stroke="#00d4aa" stroke-width="0.8" opacity="0.25"/>
    <circle cx="0" cy="0" r="32" fill="none" stroke="#00d4aa" stroke-width="0.8" opacity="0.35"/>
    <circle cx="0" cy="0" r="20" fill="none" stroke="#00d4aa" stroke-width="1" opacity="0.5"/>
    <circle cx="0" cy="0" r="8"  fill="none" stroke="#00d4aa" stroke-width="1.2" opacity="0.8"/>
    <!-- crosshair -->
    <line x1="-44" y1="0" x2="44" y2="0" stroke="#00d4aa" stroke-width="0.6" opacity="0.3"/>
    <line x1="0" y1="-44" x2="0" y2="44" stroke="#00d4aa" stroke-width="0.6" opacity="0.3"/>
    <!-- sweep arc -->
    <path d="M 0 0 L 0 -36 A 36 36 0 0 1 31.2 -18 Z" fill="#00d4aa" opacity="0.12"/>
    <line x1="0" y1="0" x2="31.2" y2="-18" stroke="#00d4aa" stroke-width="1.5" opacity="0.7"/>
    <!-- center dot -->
    <circle cx="0" cy="0" r="2.5" fill="#00d4aa" opacity="0.9"/>
    <!-- blip -->
    <circle cx="22" cy="-14" r="2" fill="#00d4aa" opacity="0.85" filter="url(#glow)"/>
    <circle cx="-16" cy="26" r="1.5" fill="#0099cc" opacity="0.7"/>
  </g>

  <!-- accent bar -->
  <rect x="130" y="54" width="3" height="52" fill="url(#accent)" rx="1.5"/>

  <!-- main title -->
  <text x="148" y="88" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="38" font-weight="700" letter-spacing="-1" fill="url(#accent)" filter="url(#glow)">tw-stock-radar</text>

  <!-- subtitle -->
  <text x="149" y="114" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="13.5" fill="#6b8caa" letter-spacing="1.5">TAIWAN FULL-MARKET INTELLIGENCE · 1,900+ STOCKS · FREE OPEN DATA</text>

  <!-- corner bracket decorations -->
  <g stroke="#00d4aa" stroke-width="1.2" fill="none" opacity="0.4">
    <polyline points="8,8 8,20 20,20"/>
    <polyline points="852,8 852,20 840,20"/>
    <polyline points="8,152 8,140 20,140"/>
    <polyline points="852,152 852,140 840,140"/>
  </g>
</svg>
